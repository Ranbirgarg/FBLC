<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
// ====== 1. Initialize Firebase ======
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ====== 2. Tab Switching ======
function showBusinessHome() {
    document.getElementById("business-home-content").classList.remove("hidden");
    document.getElementById("coupon-maker-content").classList.add("hidden");
    document.getElementById("business-messages-content").classList.add("hidden");
    document.getElementById("business-account-content").classList.add("hidden");
    updateTabStyles("tab-dashboard");
}
function showCouponMaker() {
    document.getElementById("business-home-content").classList.add("hidden");
    document.getElementById("coupon-maker-content").classList.remove("hidden");
    document.getElementById("business-messages-content").classList.add("hidden");
    document.getElementById("business-account-content").classList.add("hidden");
    updateTabStyles("tab-coupons");
}
function showBusinessMessages() {
    document.getElementById("business-home-content").classList.add("hidden");
    document.getElementById("coupon-maker-content").classList.add("hidden");
    document.getElementById("business-messages-content").classList.remove("hidden");
    document.getElementById("business-account-content").classList.add("hidden");
    updateTabStyles("tab-messages");
}
function showBusinessAccount() {
    document.getElementById("business-home-content").classList.add("hidden");
    document.getElementById("coupon-maker-content").classList.add("hidden");
    document.getElementById("business-messages-content").classList.add("hidden");
    document.getElementById("business-account-content").classList.remove("hidden");
    updateTabStyles("tab-settings");
}
function updateTabStyles(activeId) {
    ["tab-dashboard","tab-coupons","tab-messages","tab-settings"].forEach(id=>{
        const el = document.getElementById(id);
        if(id===activeId){
            el.classList.add("border-indigo-500","text-indigo-600");
            el.classList.remove("border-transparent","text-gray-500");
        } else {
            el.classList.remove("border-indigo-500","text-indigo-600");
            el.classList.add("border-transparent","text-gray-500");
        }
    });
}

// ====== 3. Create Coupon ======
function createCoupon(e) {
    e.preventDefault();
    const code = document.getElementById("coupon-code").value.trim();
    const discount = document.getElementById("coupon-discount").value.trim();
    const expires = document.getElementById("coupon-expires").value;
    if(!code || !discount || !expires) return alert("Fill all fields!");

    const expiryDate = new Date(expires);
    const formattedDate = expiryDate.toLocaleDateString("en-US", {
        year:"numeric", month:"short", day:"numeric"
    });

    db.collection("coupons").add({
        code: code.toUpperCase(),
        discount,
        expires: expiryDate,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        alert(`Coupon "${code}" created successfully!`);
        const couponsList = document.getElementById("business-coupons-list");
        const emptyState = couponsList.querySelector(".empty-state");
        if(emptyState) emptyState.remove();

        const newCoupon = document.createElement("div");
        newCoupon.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-200";
        newCoupon.innerHTML = `
            <div>
                <p class="font-bold text-indigo-700 text-sm">${code.toUpperCase()}</p>
                <p class="text-gray-700 text-xs">${discount}</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500">Expires: ${formattedDate}</p>
                <p class="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full mt-0.5">0 redemptions</p>
            </div>`;
        couponsList.appendChild(newCoupon);

        // Reset form
        document.getElementById("coupon-code").value="";
        document.getElementById("coupon-discount").value="";
        document.getElementById("coupon-expires").value="";
    })
    .catch(err => {
        console.error("Error creating coupon:", err);
        alert("Failed to create coupon.");
    });
}

// ====== 4. Send Business Message ======
function sendBusinessMessage() {
    const input = document.getElementById("business-message-input");
    const message = input.value.trim();
    if(!message) return;
    const chatMessages = document.getElementById("chat-messages");
    const newMessage = document.createElement("div");
    newMessage.className="chat-bubble business";
    newMessage.textContent = message;
    chatMessages.appendChild(newMessage);
    input.value="";
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ====== 5. Save Business Account Info ======
document.querySelector("#business-account-content button").addEventListener("click", () => {
    const name = document.querySelector('#business-account-content input[placeholder="Enter your business name"]').value;
    const type = document.querySelector('#business-account-content select').value;
    const location = document.querySelector('#business-account-content input[placeholder="Enter your business address"]').value;

    if(!name || !type || !location) return alert("Fill all required fields!");

    db.collection("businesses").add({
        name,
        type,
        location,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(()=> alert("Business info saved!"))
    .catch(err => {
        console.error("Error saving business info:", err);
        alert("Error saving business info.");
    });
});

// ====== 6. Dashboard Stats (Example) ======
function updateDashboardStats() {
    db.collection("businesses").get()
    .then(snapshot => {
        document.querySelector(".stats-card p.text-2xl").textContent = snapshot.size;
    })
    .catch(err => console.error(err));
}

// ====== 7. Logout ======
function logout() {
    if(confirm("Are you sure you want to log out?")) alert("Logged out!");
}

// ====== 8. Initialize ======
showBusinessHome();
updateDashboardStats();
</script>
