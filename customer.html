<script type="module">
  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where, addDoc, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- Businesses ---
  let businesses = [];
  let currentType = "";

  async function fetchBusinesses() {
    const colRef = collection(db, "businesses");
    const snapshot = await getDocs(colRef);
    businesses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderBusinesses();
  }

  function renderBusinesses() {
    const grid = document.getElementById("businesses-grid");
    const search = document.getElementById("search-input").value.toLowerCase();
    let filtered = businesses.filter(b => 
      (b.name.toLowerCase().includes(search) || b.type.toLowerCase().includes(search) || b.location.toLowerCase().includes(search)) &&
      (currentType === "" || b.type === currentType)
    );
    grid.innerHTML = "";

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-store"></i>
          <p class="text-3xl font-bold text-gray-700 mb-4">No businesses found</p>
          <p class="text-xl text-gray-500 max-w-2xl">Start exploring local businesses in your area.</p>
        </div>`;
      return;
    }

    filtered.forEach(b => {
      const card = document.createElement("div");
      card.className = "bg-white p-4 rounded-xl shadow-md business-card cursor-pointer";
      card.innerHTML = `<h3 class="text-lg font-semibold mb-1">${b.name}</h3>
                        <p class="text-sm text-gray-500">${b.type} - ${b.location}</p>`;
      card.addEventListener("click", () => selectBusiness(b));
      grid.appendChild(card);
    });
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("bg-indigo-600", "text-white"));
      btn.classList.add("bg-indigo-600", "text-white");
      currentType = btn.dataset.type;
      renderBusinesses();
    });
  });

  // --- Tabs ---
  function switchTab(tab) {
    document.querySelectorAll(".tab-content").forEach(c => c.classList.add("hidden"));
    document.getElementById(tab).classList.remove("hidden");

    document.querySelectorAll("nav button").forEach(b => {
      b.classList.remove("border-indigo-500", "text-indigo-600");
      b.classList.add("border-transparent", "text-gray-500");
    });

    document.getElementById(`tab-${tab}`).classList.add("border-indigo-500", "text-indigo-600");
    document.getElementById(`tab-${tab}`).classList.remove("border-transparent", "text-gray-500");
  }

  // --- Messages ---
  let selectedBusiness = null;
  const messageInput = document.getElementById("customer-message-input");
  const chatMessages = document.getElementById("chat-messages");

  function selectBusiness(business) {
    selectedBusiness = business;
    switchTab("messages");
    messageInput.disabled = false;
    messageInput.placeholder = "Type a message...";
    document.querySelector("#messages button").classList.remove("cursor-not-allowed", "bg-gray-400");
    document.getElementById("chat-business-name").textContent = business.name;
    loadConversation(business.id);
  }

  async function loadConversation(businessId) {
    chatMessages.innerHTML = "";
    const convoRef = collection(db, "conversations");
    const q = query(convoRef, where("businessId", "==", businessId), orderBy("timestamp"));
    
    onSnapshot(q, snapshot => {
      chatMessages.innerHTML = "";
      if (snapshot.empty) {
        chatMessages.innerHTML = `
          <div class="text-center text-gray-500">
            <i class="fas fa-comment-dots text-3xl mb-3 opacity-50"></i>
            <p class="text-base font-medium">No messages yet</p>
          </div>`;
        return;
      }
      snapshot.forEach(doc => {
        const msg = doc.data();
        const bubble = document.createElement("div");
        bubble.className = `chat-bubble ${msg.sender === "business" ? "business" : "customer"}`;
        bubble.textContent = msg.text;
        chatMessages.appendChild(bubble);
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  messageInput.addEventListener("keypress", async e => {
    if (e.key === "Enter" && messageInput.value.trim() && selectedBusiness) {
      const text = messageInput.value.trim();
      await addDoc(collection(db, "conversations"), {
        businessId: selectedBusiness.id,
        sender: "customer",
        text,
        timestamp: new Date()
      });
      messageInput.value = "";
    }
  });

  // --- Account Preferences ---
  document.querySelector("button.bg-indigo-600").addEventListener("click", async () => {
    const loc = document.querySelector("select").value;
    // Here you would update Firestore customer doc with location preference
    alert(`Preferences saved: ${loc}`);
  });

  // --- Logout ---
  function logout() {
    if (confirm("Are you sure you want to log out?")) alert("You have been logged out successfully.");
  }

  // --- Initialize ---
  switchTab("catalog");
  fetchBusinesses();
</script>
